const{useState,useEffect,useCallback,useMemo,createContext,useContext,useRef}=React;

// ===== THEME =====
const ThemeCtx=createContext();
function ThemeProvider({children}){
  const[dark,setDark]=useState(()=>{try{return localStorage.getItem('etomega-theme')==='dark'}catch{return true}});
  useEffect(()=>{document.documentElement.classList.toggle('dark',dark);try{localStorage.setItem('etomega-theme',dark?'dark':'light')}catch{}},[dark]);
  return <ThemeCtx.Provider value={{dark,toggle:()=>setDark(d=>!d)}}>{children}</ThemeCtx.Provider>;
}
const useTheme=()=>useContext(ThemeCtx);

const fmt$=(v)=>new Intl.NumberFormat('en-CA',{style:'currency',currency:'CAD',minimumFractionDigits:0,maximumFractionDigits:0}).format(v);
const fmtDate=(d)=>{if(!d)return'—';return new Date(d+'T00:00:00').toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'})};
const pct=(a,b)=>b?Math.round(a/b*100):0;
const margin=(est,act)=>est?((est-act)/est*100):0;
const isLate=(d)=>d&&new Date(d)<new Date();
const today=new Date().toISOString().split('T')[0];

  cardH:{background:'var(--bg-card-h)',border:'1px solid var(--brand)',borderRadius:12,padding:20,cursor:'pointer'},

  btnP:{background:'var(--brand)',color:'#fff'},
  btnS:{background:'var(--bg-card)',color:'var(--text-2)',border:'1px solid var(--border)'},
  btnG:{background:'transparent',color:'var(--text-3)',border:'none',fontSize:12},
  btnD:{background:'#dc2626',color:'#fff'},
  btnOk:{background:'var(--green)',color:'#fff'},

function Badge({status,map}){const cfg=(map||JOB_ST)[status]||{l:status,b:'var(--border)',c:'var(--text-3)'};return <span style={s.badge(cfg.b,cfg.c)}>{cfg.l}</span>}
function Dot({p}){return <span style={{display:'inline-flex',alignItems:'center',gap:4}}><span style={{width:7,height:7,borderRadius:'50%',background:PRI[p]?.c||'var(--text-3)'}} /><span style={{fontSize:11,color:'var(--text-2)',textTransform:'capitalize'}}>{p}</span></span>}
function Bar({v,color,h=6}){const c=v>100?'var(--red)':v>90?'var(--amber)':color||'var(--brand)';return <div style={{background:'var(--bg-input)',borderRadius:h,height:h,width:'100%',overflow:'hidden'}}><div style={{width:`${Math.min(v,100)}%`,height:'100%',background:c,borderRadius:h,transition:'width .5s'}}/></div>}
function Card({children,style,onClick}){return <div onClick={onClick} style={{...s.card,cursor:onClick?'pointer':'default',...style}}>{children}</div>}
function Metric({label,value,sub,icon,bg}){return <Card><div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}><div><div style={{color:'var(--text-3)',fontSize:11,fontWeight:600,textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>{label}</div><div style={{fontSize:26,fontWeight:800}}>{value}</div>{sub&&<div style={{color:'var(--text-2)',fontSize:12,marginTop:3}}>{sub}</div>}</div><div style={{width:40,height:40,borderRadius:10,background:bg||'var(--brand-l)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>{icon}</div></div></Card>}
function Btn({children,v='p',onClick,disabled,style:sx}){const vs={p:s.btnP,s:s.btnS,g:s.btnG,d:s.btnD,ok:s.btnOk};return <button onClick={onClick} disabled={disabled} style={{...s.btn,...(vs[v]||vs.p),opacity:disabled?.5:1,...sx}}>{children}</button>}
function Input({label,value,onChange,placeholder,type='text',style:sx}){return <div style={{marginBottom:10,...sx}}>{label&&<label style={{display:'block',fontSize:12,fontWeight:500,color:'var(--text-2)',marginBottom:3}}>{label}</label>}<input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={s.input}/></div>}
function Sel({label,value,onChange,options,style:sx}){return <div style={{marginBottom:10,...sx}}>{label&&<label style={{display:'block',fontSize:12,fontWeight:500,color:'var(--text-2)',marginBottom:3}}>{label}</label>}<select value={value} onChange={e=>onChange(e.target.value)} style={s.input}>{options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</select></div>}
function Modal({title,onClose,children,wide}){return <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}} onClick={onClose}><div className="fade-in" onClick={e=>e.stopPropagation()} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:16,width:wide?700:550,maxWidth:'95vw',maxHeight:'85vh',overflow:'auto',padding:24}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}><h3 style={{fontSize:18,fontWeight:700}}>{title}</h3><button onClick={onClose} style={{background:'none',border:'none',color:'var(--text-3)',fontSize:20,cursor:'pointer'}}>✕</button></div>{children}</div></div>}
function Tbl({cols,data,onRow}){if(!data.length)return <div style={{textAlign:'center',padding:40,color:'var(--text-3)',fontSize:13}}>No data</div>;return <div style={{overflowX:'auto'}}><table style={{width:'100%',borderCollapse:'collapse'}}><thead><tr>{cols.map((c,i)=><th key={i} style={{...s.th,textAlign:c.a||'left'}}>{c.h}</th>)}</tr></thead><tbody>{data.map((r,ri)=><tr key={ri} onClick={()=>onRow&&onRow(r)} style={{cursor:onRow?'pointer':'default'}} onMouseEnter={e=>{if(onRow)e.currentTarget.style.background='var(--bg-card-h)'}} onMouseLeave={e=>{e.currentTarget.style.background='transparent'}}>{cols.map((c,ci)=><td key={ci} style={{...s.td,textAlign:c.a||'left',color:c.m?'var(--text-2)':'var(--text-1)'}}>{c.r?c.r(r):r[c.k]}</td>)}</tr>)}</tbody></table></div>}

// ===== APP CONTEXT =====
const Ctx=createContext();
function AppProv({children}){
  const[jobs,setJobs]=useState(INIT_JOBS);
  const[bom,setBom]=useState(INIT_BOM);
  const[pos,setPOs]=useState(INIT_POS);
  const[rcv,setRcv]=useState(INIT_RCV);
  const[page,setPage]=useState('dash');
  const[selJob,setSelJob]=useState(null);
  const[notifs,setNotifs]=useState([]);
  const notify=(msg,type='info')=>{const id=gid();setNotifs(p=>[...p,{id,msg,type}]);setTimeout(()=>setNotifs(p=>p.filter(n=>n.id!==id)),4000)};
  const eT=j=>(j.eL||0)+(j.eM||0)+(j.eO||0);
  const aT=j=>(j.aL||0)+(j.aM||0)+(j.aO||0);
  return <Ctx.Provider value={{jobs,setJobs,bom,setBom,pos,setPOs,rcv,setRcv,page,setPage,selJob,setSelJob,notifs,notify,eT,aT,CUST}}>{children}</Ctx.Provider>;
}
const useApp=()=>useContext(Ctx);

// ===== NOTIFICATIONS =====

// ===== DASHBOARD =====

  const openPOs=pos.filter(p=>!['received','closed'].includes(p.st));
  const longLead=bom.filter(b=>b.lt>21&&b.st!=='received'&&b.st!=='complete');
  const overBudget=jobs.filter(j=>aT(j)>eT(j)&&j.status!=='quoting');
  const costable=jobs.filter(j=>j.status!=='quoting');
  const totE=costable.reduce((s,j)=>s+eT(j),0);
  const totA=costable.reduce((s,j)=>s+aT(j),0);
  const mv=margin(totE,totA);
  return <div className="fade-in">
    <div style={{marginBottom:20}}><h1 style={{fontSize:22,fontWeight:800}}>Dashboard</h1><p style={{color:'var(--text-2)',fontSize:14,marginTop:4}}>Welcome back, James. Here's your shop at a glance.</p></div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>

      <Metric label="Open POs" value={openPOs.length} sub={fmt$(openPOs.reduce((s,p)=>s+p.total,0))+' outstanding'} icon="📦" bg="rgba(59,130,246,0.12)"/>
      <Metric label="Long-Lead" value={longLead.length} sub=">21 day lead time" icon="⏰" bg="rgba(245,158,11,0.12)"/>
      <Metric label="Margin" value={`${mv>=0?'+':''}${mv.toFixed(1)}%`} sub={overBudget.length?`${overBudget.length} over budget`:'All on track'} icon="📊" bg={overBudget.length?'rgba(239,68,68,0.12)':'rgba(16,185,129,0.12)'}/>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
      <Card>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}><h3 style={{fontSize:14,fontWeight:700}}>Active Jobs</h3><Btn v="g" onClick={()=>setPage('jobs')}>View all →</Btn></div>
        {active.map(j=>{const c=CUST.find(x=>x.id===j.cid);const cp=pct(aT(j),eT(j));return <div key={j.id} style={{padding:'12px 0',borderBottom:'1px solid var(--border)',cursor:'pointer'}} onClick={()=>{setSelJob(j.id);setPage('jobs')}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}><div><span style={{fontSize:11,color:'var(--text-3)',marginRight:8,fontFamily:'monospace'}}>{j.num}</span><span style={{fontSize:13,fontWeight:600}}>{j.name}</span></div><Dot p={j.pri}/></div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style={{fontSize:12,color:'var(--text-2)'}}>{c?.name}</span><span style={{fontSize:12,color:'var(--text-2)'}}>{j.pct}%</span></div>
          <Bar v={j.pct}/><div style={{display:'flex',justifyContent:'space-between',marginTop:4}}><span style={{fontSize:11,color:'var(--text-3)'}}>{fmt$(aT(j))} / {fmt$(eT(j))}</span><span style={{fontSize:11,color:cp>90?'var(--red)':'var(--text-3)'}}>{cp}% of budget</span></div>
        </div>})}
      </Card>
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        <Card>
          <h3 style={{fontSize:14,fontWeight:700,marginBottom:14}}>Margin Tracker</h3>
          {costable.map(j=>{const m=margin(eT(j),aT(j));return <div key={j.id} style={{marginBottom:10}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}><span style={{fontSize:12,fontWeight:500}}>{j.num}</span><span style={{fontSize:12,fontWeight:600,color:m<0?'var(--red)':m<15?'var(--amber)':'var(--green)'}}>{m>=0?'+':''}{m.toFixed(1)}%</span></div><Bar v={100-Math.abs(m)} color={m<0?'var(--red)':m<15?'var(--amber)':'var(--green)'}/></div>})}
        </Card>
        <Card style={overBudget.length||longLead.length?{borderColor:'rgba(245,158,11,0.4)'}:{}}>
          <h3 style={{fontSize:14,fontWeight:700,marginBottom:10}}>⚠️ Alerts</h3>
          {overBudget.map(j=><div key={j.id} style={{padding:'8px 12px',background:'rgba(239,68,68,0.08)',borderRadius:8,marginBottom:6,fontSize:12,color:'var(--red)'}}><strong>{j.num}</strong> over budget by {fmt$(aT(j)-eT(j))}</div>)}
          {longLead.filter(b=>b.st==='ordered').map(b=><div key={b.id} style={{padding:'8px 12px',background:'rgba(245,158,11,0.08)',borderRadius:8,marginBottom:6,fontSize:12,color:'var(--amber)'}}><strong>{b.pn}</strong> — {b.lt}d lead ({b.desc})</div>)}
          {openPOs.filter(p=>isLate(p.exp)).map(p=><div key={p.id} style={{padding:'8px 12px',background:'rgba(239,68,68,0.08)',borderRadius:8,marginBottom:6,fontSize:12,color:'var(--red)'}}><strong>{p.num}</strong> overdue from {p.sup}</div>)}
          {!overBudget.length&&!longLead.filter(b=>b.st==='ordered').length&&<p style={{fontSize:12,color:'var(--text-3)'}}>No active alerts</p>}
        </Card>
      </div>
    </div>
  </div>;
}

function Jobs(){const{jobs,setJobs,CUST,selJob,setSelJob,eT,aT,notify,bom,pos}=useApp();const[showNew,setShowNew]=useState(false);const[filter,setFilter]=useState('all');const[search,setSearch]=useState('');
  const filtered=jobs.filter(j=>{if(filter!=='all'&&j.status!==filter)return false;if(search){const sl=search.toLowerCase();const c=CUST.find(x=>x.id===j.cid);return j.name.toLowerCase().includes(sl)||j.num.toLowerCase().includes(sl)||(c?.name||'').toLowerCase().includes(sl)}return true});

    </Card>

function NewJobModal({onClose}){const{jobs,setJobs,CUST,notify}=useApp();const[f,sF]=useState({name:'',cid:CUST[0].id,pri:'medium',due:'',eL:'',eM:'',desc:''});

}

      <Card><h3 style={{fontSize:14,fontWeight:700,marginBottom:14}}>Materials</h3><div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}><span style={{fontSize:13,color:'var(--text-2)'}}>Estimated</span><span style={{fontSize:13,fontWeight:600}}>{fmt$(j.eM)}</span></div><div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}><span style={{fontSize:13,color:'var(--text-2)'}}>Actual</span><span style={{fontSize:13,fontWeight:600,color:j.aM>j.eM?'var(--red)':'var(--green)'}}>{fmt$(j.aM)}</span></div><Bar v={j.eM?j.aM/j.eM*100:0} color="var(--gold)"/></Card>

      <Tbl cols={[{h:'Part #',r:r=><span style={s.mono}>{r.pn}</span>},{h:'Description',r:r=>r.desc},{h:'Qty',r:r=>r.qty,a:'center'},{h:'Unit',r:r=>fmt$(r.uc),a:'right'},{h:'Total',r:r=><span style={{fontWeight:600}}>{fmt$(r.qty*r.uc)}</span>,a:'right'},{h:'Supplier',r:r=>r.sup,m:1},{h:'Lead',r:r=><span style={{color:r.lt>21?'var(--amber)':'var(--text-3)'}}>{r.lt}d{r.lt>21?' ⚠':''}</span>,a:'center'},{h:'Status',r:r=><Badge status={r.st} map={BOM_ST}/>}]} data={jBom}/>

function BOMPage(){const{bom,setBom,jobs,notify}=useApp();const[jf,setJf]=useState('all');const[search,setSearch]=useState('');const[showAdd,setShowAdd]=useState(false);
  const filtered=bom.filter(b=>{if(jf!=='all'&&b.jid!==jf)return false;if(search){const sl=search.toLowerCase();return b.pn.toLowerCase().includes(sl)||b.desc.toLowerCase().includes(sl)||b.sup.toLowerCase().includes(sl)}return true});
  const tv=filtered.reduce((s,b)=>s+b.qty*b.uc,0);

    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}><div><h1 style={{fontSize:22,fontWeight:800}}>Bill of Materials</h1><p style={{color:'var(--text-2)',fontSize:14,marginTop:4}}>{bom.length} parts · {fmt$(tv)} value</p></div><Btn onClick={()=>setShowAdd(true)}>+ Add Part</Btn></div>
    <div style={{display:'flex',gap:8,marginBottom:14,alignItems:'center'}}><Sel value={jf} onChange={setJf} options={[{value:'all',label:'All Jobs'},...jobs.map(j=>({value:j.id,label:j.num+' - '+j.name}))]} style={{marginBottom:0,width:280}}/><div style={{flex:1}}/><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search parts..." style={{...s.input,width:200}}/></div>
    <Card style={{padding:0,overflow:'hidden'}}>
      <Tbl cols={[{h:'Part #',r:r=><span style={s.mono}>{r.pn}</span>},{h:'Description',r:r=>r.desc},{h:'Job',r:r=>{const j=jobs.find(x=>x.id===r.jid);return j?.num||'—'},m:1},{h:'Qty',r:r=>r.qty,a:'center'},{h:'Unit',r:r=>fmt$(r.uc),a:'right'},{h:'Total',r:r=><span style={{fontWeight:600}}>{fmt$(r.qty*r.uc)}</span>,a:'right'},{h:'Supplier',r:r=>r.sup,m:1},{h:'Lead',r:r=><span style={{color:r.lt>21?'var(--amber)':'var(--text-3)'}}>{r.lt}d{r.lt>21?' ⚠':''}</span>,a:'center'},{h:'Status',r:r=><Badge status={r.st} map={BOM_ST}/>}]} data={filtered}/>
    </Card>
    {showAdd&&<AddPartModal onClose={()=>setShowAdd(false)}/>}

function AddPartModal({onClose}){const{jobs,setBom,notify}=useApp();const aj=jobs.filter(j=>j.status!=='complete');const[f,sF]=useState({jid:aj[0]?.id||'',pn:'',desc:'',cat:'pur',qty:1,uc:'',sup:'',lt:''});

// ===== COSTING =====
function Costing(){const{jobs,eT,aT}=useApp();const cj=jobs.filter(j=>j.status!=='quoting');const tE=cj.reduce((s,j)=>s+eT(j),0);const tA=cj.reduce((s,j)=>s+aT(j),0);const tL=cj.reduce((s,j)=>s+j.aL,0);const tM=cj.reduce((s,j)=>s+j.aM,0);
  return <div className="fade-in">
    <div style={{marginBottom:20}}><h1 style={{fontSize:22,fontWeight:800}}>Job Costing</h1><p style={{color:'var(--text-2)',fontSize:14,marginTop:4}}>Estimated vs actual across all jobs</p></div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
      <Metric label="Total Estimated" value={fmt$(tE)} icon="📋"/><Metric label="Total Actual" value={fmt$(tA)} sub={`${pct(tA,tE)}% of estimates`} icon="💵" bg={tA>tE?'rgba(239,68,68,0.12)':'rgba(16,185,129,0.12)'}/><Metric label="Labor Spent" value={fmt$(tL)} icon="👷" bg="rgba(59,130,246,0.12)"/><Metric label="Material Spent" value={fmt$(tM)} icon="🔩" bg="rgba(245,158,11,0.12)"/>
    </div>
    <Card style={{padding:0,overflow:'hidden',marginBottom:20}}>
      <Tbl cols={[{h:'Job #',r:r=><span style={s.mono}>{r.num}</span>},{h:'Name',r:r=>r.name},{h:'Est. Labor',r:r=>fmt$(r.eL),a:'right'},{h:'Act. Labor',r:r=><span style={{color:r.aL>r.eL?'var(--red)':''}}>{fmt$(r.aL)}</span>,a:'right'},{h:'Est. Material',r:r=>fmt$(r.eM),a:'right'},{h:'Act. Material',r:r=><span style={{color:r.aM>r.eM?'var(--red)':''}}>{fmt$(r.aM)}</span>,a:'right'},{h:'Est. Total',r:r=><span style={{fontWeight:600}}>{fmt$(eT(r))}</span>,a:'right'},{h:'Act. Total',r:r=><span style={{fontWeight:700,color:aT(r)>eT(r)?'var(--red)':'var(--green)'}}>{fmt$(aT(r))}</span>,a:'right'},{h:'Margin',r:r=>{const m=margin(eT(r),aT(r));return <span style={{fontWeight:700,color:m<0?'var(--red)':m<10?'var(--amber)':'var(--green)'}}>{m>=0?'+':''}{m.toFixed(1)}%</span>},a:'right'}]} data={cj}/>
    </Card>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
      <Card><h3 style={{fontSize:14,fontWeight:700,marginBottom:14}}>Cost Variance</h3>{cj.map(j=>{const v=eT(j)-aT(j);const mp=margin(eT(j),aT(j));const bw=Math.min(Math.abs(mp)/50*150,150);return <div key={j.id} style={{marginBottom:10,display:'flex',alignItems:'center',gap:10}}><span style={{fontSize:12,fontWeight:500,width:90,flexShrink:0}}>{j.num}</span><div style={{flex:1,display:'flex',alignItems:'center'}}><div style={{width:'50%',display:'flex',justifyContent:'flex-end'}}>{v<0&&<div style={{width:bw,height:14,background:'var(--red)',borderRadius:'4px 0 0 4px'}}/>}</div><div style={{width:2,height:18,background:'var(--border-l)',flexShrink:0}}/><div>{v>=0&&<div style={{width:bw,height:14,background:'var(--green)',borderRadius:'0 4px 4px 0'}}/>}</div></div><span style={{fontSize:11,fontWeight:600,width:55,textAlign:'right',color:v<0?'var(--red)':'var(--green)'}}>{v>=0?'+':''}{fmt$(v)}</span></div>})}<div style={{fontSize:11,color:'var(--text-3)',textAlign:'center',marginTop:6}}>← Over | Under →</div></Card>
      <Card><h3 style={{fontSize:14,fontWeight:700,marginBottom:14}}>Labor vs Material</h3>{cj.map(j=>{const t=j.aL+j.aM;const lp=t?j.aL/t*100:50;return <div key={j.id} style={{marginBottom:10}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}><span style={{fontSize:12,fontWeight:500}}>{j.num}</span><span style={{fontSize:11,color:'var(--text-3)'}}>{lp.toFixed(0)}% L / {(100-lp).toFixed(0)}% M</span></div><div style={{display:'flex',height:10,borderRadius:5,overflow:'hidden'}}><div style={{width:`${lp}%`,background:'var(--blue)'}}/><div style={{width:`${100-lp}%`,background:'var(--gold)'}}/></div></div>})}<div style={{display:'flex',gap:14,marginTop:10,justifyContent:'center'}}><span style={{fontSize:11,color:'var(--text-3)',display:'flex',alignItems:'center',gap:4}}><span style={{width:10,height:10,borderRadius:2,background:'var(--blue)',display:'inline-block'}}/>Labor</span><span style={{fontSize:11,color:'var(--text-3)',display:'flex',alignItems:'center',gap:4}}><span style={{width:10,height:10,borderRadius:2,background:'var(--gold)',display:'inline-block'}}/>Material</span></div></Card>
    </div>
  </div>;
}

// ===== PURCHASE ORDERS =====
function POPage(){const{pos,setPOs,jobs,notify}=useApp();const[filter,setFilter]=useState('all');const[showNew,setShowNew]=useState(false);const[selPO,setSelPO]=useState(null);
  const filtered=pos.filter(p=>filter==='all'||p.st===filter);const tOpen=pos.filter(p=>!['received','closed'].includes(p.st)).reduce((s,p)=>s+p.total,0);
  return <div className="fade-in">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}><div><h1 style={{fontSize:22,fontWeight:800}}>Purchase Orders</h1><p style={{color:'var(--text-2)',fontSize:14,marginTop:4}}>{pos.length} total · {fmt$(tOpen)} outstanding</p></div><Btn onClick={()=>setShowNew(true)}>+ New PO</Btn></div>
    <div style={{display:'flex',gap:6,marginBottom:14}}>{['all','sent','acknowledged','partial','received'].map(f=><button key={f} onClick={()=>setFilter(f)} style={{padding:'5px 14px',borderRadius:20,border:'none',cursor:'pointer',fontSize:12,fontWeight:500,fontFamily:'inherit',background:filter===f?'var(--brand)':'var(--bg-card)',color:filter===f?'#fff':'var(--text-2)'}}>{f==='all'?'All':f[0].toUpperCase()+f.slice(1)}</button>)}</div>
    <Card style={{padding:0,overflow:'hidden'}}>
      <Tbl cols={[{h:'PO #',r:r=><span style={s.mono}>{r.num}</span>},{h:'Supplier',r:r=>r.sup},{h:'Job',r:r=>{const j=jobs.find(x=>x.id===r.jid);return j?.num||'—'},m:1},{h:'Date',r:r=>fmtDate(r.date),m:1},{h:'Expected',r:r=><span style={{color:isLate(r.exp)&&r.st!=='received'?'var(--red)':''}}>{fmtDate(r.exp)}{isLate(r.exp)&&r.st!=='received'?' ⚠':''}</span>},{h:'Items',r:r=>r.items.length,a:'center'},{h:'Total',r:r=><span style={{fontWeight:600}}>{fmt$(r.total)}</span>,a:'right'},{h:'Status',r:r=><Badge status={r.st} map={PO_ST}/>}]} data={filtered} onRow={r=>setSelPO(r.id)}/>
    </Card>
    {showNew&&<NewPOModal onClose={()=>setShowNew(false)}/>}
    {selPO&&<PODetail poId={selPO} onClose={()=>setSelPO(null)}/>}
  </div>;
}
function NewPOModal({onClose}){const{jobs,pos,setPOs,notify}=useApp();const aj=jobs.filter(j=>j.status!=='complete');const[f,sF]=useState({jid:aj[0]?.id||'',sup:'',exp:'',notes:''});const[items,setItems]=useState([{pn:'',desc:'',qty:1,uc:0}]);
  const addItem=()=>setItems([...items,{pn:'',desc:'',qty:1,uc:0}]);const upItem=(i,k,v)=>{const n=[...items];n[i][k]=v;setItems(n)};const total=items.reduce((s,i)=>s+(+i.qty||0)*(+i.uc||0),0);
  const save=()=>{if(!f.sup||!f.jid)return;const num=`PO-2026-${String(pos.length+1).padStart(3,'0')}`;setPOs(p=>[...p,{id:gid(),num,sup:f.sup,jid:f.jid,date:today,exp:f.exp,st:'draft',items:items.filter(i=>i.pn).map(i=>({...i,qty:+i.qty,uc:+i.uc,rcv:0})),total,notes:f.notes}]);notify(`${num} created`,'success');onClose()};
  return <Modal title="New Purchase Order" onClose={onClose} wide><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}><Sel label="Job *" value={f.jid} onChange={v=>sF({...f,jid:v})} options={aj.map(j=>({value:j.id,label:j.num+' - '+j.name}))}/><Input label="Supplier *" value={f.sup} onChange={v=>sF({...f,sup:v})}/></div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}><Input label="Expected Delivery" type="date" value={f.exp} onChange={v=>sF({...f,exp:v})}/><Input label="Notes" value={f.notes} onChange={v=>sF({...f,notes:v})}/></div><h4 style={{fontSize:13,fontWeight:600,marginTop:14,marginBottom:8}}>Line Items</h4>{items.map((it,i)=><div key={i} style={{display:'grid',gridTemplateColumns:'1fr 2fr 80px 100px',gap:6,marginBottom:6}}><Input placeholder="Part #" value={it.pn} onChange={v=>upItem(i,'pn',v)} style={{marginBottom:0}}/><Input placeholder="Description" value={it.desc} onChange={v=>upItem(i,'desc',v)} style={{marginBottom:0}}/><Input placeholder="Qty" type="number" value={it.qty} onChange={v=>upItem(i,'qty',v)} style={{marginBottom:0}}/><Input placeholder="Unit $" type="number" value={it.uc} onChange={v=>upItem(i,'uc',v)} style={{marginBottom:0}}/></div>)}<Btn v="g" onClick={addItem}>+ Add Line</Btn><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:14,paddingTop:14,borderTop:'1px solid var(--border)'}}><div style={{fontSize:16,fontWeight:700}}>Total: {fmt$(total)}</div><div style={{display:'flex',gap:8}}><Btn v="s" onClick={onClose}>Cancel</Btn><Btn onClick={save}>Create PO</Btn></div></div></Modal>;
}
function PODetail({poId,onClose}){const{pos}=useApp();const po=pos.find(p=>p.id===poId);if(!po)return null;return <Modal title={`${po.num} — ${po.sup}`} onClose={onClose}><div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:14,marginBottom:16}}><div><div style={{fontSize:11,color:'var(--text-3)',marginBottom:2}}>STATUS</div><Badge status={po.st} map={PO_ST}/></div><div><div style={{fontSize:11,color:'var(--text-3)',marginBottom:2}}>DATE</div><div style={{fontSize:14,fontWeight:500}}>{fmtDate(po.date)}</div></div><div><div style={{fontSize:11,color:'var(--text-3)',marginBottom:2}}>EXPECTED</div><div style={{fontSize:14,fontWeight:500}}>{fmtDate(po.exp)}</div></div></div>{po.notes&&<div style={{padding:'10px 14px',background:'var(--bg-input)',borderRadius:8,marginBottom:14,fontSize:13,color:'var(--text-2)'}}>📝 {po.notes}</div>}<Tbl cols={[{h:'Part #',r:r=><span style={{fontFamily:'monospace',fontSize:12}}>{r.pn}</span>},{h:'Description',r:r=>r.desc},{h:'Qty',r:r=>r.qty,a:'center'},{h:'Received',r:r=><span style={{color:r.rcv>=r.qty?'var(--green)':''}}>{r.rcv}</span>,a:'center'},{h:'Unit',r:r=>fmt$(r.uc),a:'right'},{h:'Total',r:r=>fmt$(r.qty*r.uc),a:'right'}]} data={po.items}/><div style={{textAlign:'right',marginTop:12,fontSize:18,fontWeight:800}}>Total: {fmt$(po.total)}</div></Modal>}

// ===== RECEIVING =====
function RcvPage(){const{rcv,setRcv,pos,setPOs,bom,setBom,jobs,notify}=useApp();const[showRcv,setShowRcv]=useState(false);const openPOs=pos.filter(p=>!['received','closed'].includes(p.st));
  return <div className="fade-in">
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}><div><h1 style={{fontSize:22,fontWeight:800}}>Receiving</h1><p style={{color:'var(--text-2)',fontSize:14,marginTop:4}}>{rcv.length} receipts · {openPOs.length} POs awaiting</p></div><Btn onClick={()=>setShowRcv(true)}>+ Receive Items</Btn></div>
    <Card style={{marginBottom:14}}><h3 style={{fontSize:14,fontWeight:700,marginBottom:14}}>Awaiting Delivery ({openPOs.length})</h3>
      {openPOs.length?<Tbl cols={[{h:'PO #',r:r=><span style={s.mono}>{r.num}</span>},{h:'Supplier',r:r=>r.sup},{h:'Job',r:r=>{const j=jobs.find(x=>x.id===r.jid);return j?.num||'—'},m:1},{h:'Expected',r:r=><span style={{color:isLate(r.exp)?'var(--red)':''}}>{fmtDate(r.exp)}{isLate(r.exp)?' 🔴':''}</span>},{h:'Items',r:r=>r.items.map(i=>`${i.pn} (${i.rcv}/${i.qty})`).join(', '),m:1},{h:'Total',r:r=>fmt$(r.total),a:'right'},{h:'Status',r:r=><Badge status={r.st} map={PO_ST}/>}]} data={openPOs}/>:<div style={{textAlign:'center',padding:30,color:'var(--text-3)',fontSize:13}}>✅ All clear — no outstanding POs</div>}
    </Card>
    <Card><h3 style={{fontSize:14,fontWeight:700,marginBottom:14}}>Recent Receipts</h3>
      <Tbl cols={[{h:'Date',r:r=>fmtDate(r.date)},{h:'PO #',r:r=>{const p=pos.find(x=>x.id===r.poId);return <span style={s.mono}>{p?.num||'—'}</span>}},{h:'Supplier',r:r=>{const p=pos.find(x=>x.id===r.poId);return p?.sup||'—'},m:1},{h:'Items',r:r=>r.items.map(i=>`${i.pn} x${i.qty}`).join(', ')},{h:'By',r:r=>r.by,m:1},{h:'Condition',r:r=>r.items.every(i=>i.cond==='good')?<span style={{color:'var(--green)'}}>✓ Good</span>:<span style={{color:'var(--amber)'}}>⚠ Issue</span>}]} data={[...rcv].reverse()}/>
    </Card>
    {showRcv&&<ReceiveModal onClose={()=>setShowRcv(false)}/>}
  </div>;
}
function ReceiveModal({onClose}){const{pos,setPOs,rcv,setRcv,notify}=useApp();const openPOs=pos.filter(p=>!['received','closed'].includes(p.st));const[selPO,setSelPO]=useState(openPOs[0]?.id||'');const[by,setBy]=useState('James M.');const[items,setItems]=useState([]);
  useEffect(()=>{if(selPO){const po=pos.find(p=>p.id===selPO);if(po)setItems(po.items.map(i=>({...i,rcvQty:Math.max(0,i.qty-i.rcv),cond:'good',notes:''})))}},[selPO]);
  const save=()=>{if(!selPO)return;const po=pos.find(p=>p.id===selPO);const ri=items.filter(i=>+i.rcvQty>0);if(!ri.length)return;setPOs(p=>p.map(x=>{if(x.id!==selPO)return x;const ui=x.items.map(xi=>{const r=ri.find(y=>y.pn===xi.pn);return r?{...xi,rcv:xi.rcv+(+r.rcvQty)}:xi});const done=ui.every(i=>i.rcv>=i.qty);return{...x,items:ui,st:done?'received':'partial'}}));setRcv(p=>[...p,{id:gid(),poId:selPO,date:today,by,items:ri.map(i=>({pn:i.pn,qty:+i.rcvQty,cond:i.cond,notes:i.notes})),st:'inspected'}]);notify(`Received ${ri.length} items from ${po?.sup}`,'success');onClose()};
  return <Modal title="Receive Items" onClose={onClose} wide><div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:10}}><Sel label="Purchase Order *" value={selPO} onChange={setSelPO} options={openPOs.map(p=>({value:p.id,label:`${p.num} — ${p.sup}`}))}/><Input label="Received By" value={by} onChange={setBy}/></div>{items.length>0&&<>{items.map((it,i)=><div key={i} style={{padding:10,background:'var(--bg-input)',borderRadius:8,marginBottom:8,marginTop:i===0?14:0}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}><div><span style={{fontFamily:'monospace',fontSize:12,fontWeight:600}}>{it.pn}</span><span style={{fontSize:12,color:'var(--text-2)',marginLeft:8}}>{it.desc}</span></div><span style={{fontSize:12,color:'var(--text-3)'}}>Ordered: {it.qty} / Prev: {it.rcv}</span></div><div style={{display:'grid',gridTemplateColumns:'80px 120px 1fr',gap:6}}><Input label="Qty" type="number" value={it.rcvQty} onChange={v=>{const n=[...items];n[i].rcvQty=v;setItems(n)}} style={{marginBottom:0}}/><Sel label="Condition" value={it.cond} onChange={v=>{const n=[...items];n[i].cond=v;setItems(n)}} options={[{value:'good',label:'Good'},{value:'damaged',label:'Damaged'},{value:'wrong',label:'Wrong Item'}]} style={{marginBottom:0}}/><Input label="Notes" value={it.notes} onChange={v=>{const n=[...items];n[i].notes=v;setItems(n)}} style={{marginBottom:0}}/></div></div>)}</>}<div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:14}}><Btn v="s" onClick={onClose}>Cancel</Btn><Btn v="ok" onClick={save}>✓ Confirm Receipt</Btn></div></Modal>;
}

// ===== APP =====
function App(){return <ThemeProvider><AppProv><div style={{display:'flex',height:'100vh'}}><Sidebar/><main style={{flex:1,overflow:'auto',padding:24}}><Router/></main><Notifs/></div></AppProv></ThemeProvider>}
function Router(){const{page}=useApp();switch(page){case'dash':return <Dashboard/>;case'jobs':return <Jobs/>;case'bom':return <BOMPage/>;case'cost':return <Costing/>;case'po':return <POPage/>;case'rcv':return <RcvPage/>;default:return <Dashboard/>}}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
